<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <title>Login</title>
</head>
<body>
  <div class="auth">
    <div class="card authCard">
      <div class="hero">
        <div class="pill"><span class="badgeDot"></span> Login</div>
        <h1 class="h1" style="margin-top:14px;">Inicia sesión</h1>
        <p class="p">Accede a tus chats, grupos, tareas y recompensas.</p>
        <div class="smallLinks" style="margin-top:16px;">
          <a class="btn" href="index.html">Bienvenida</a>
          <a class="btn" href="registro.html">Crear cuenta</a>
        </div>
      </div>

      <form class="form">
        <h2 class="h2">Credenciales</h2>
        <div style="margin-top:12px;">
          <input id="correoLogin" class="input" placeholder="Correo o usuario" />
        </div>
        <div style="margin-top:12px;">
          <input id="passwordLogin" class="input" type="password" placeholder="Contraseña" />
        </div>
        <div style="display:flex; gap:10px; margin-top:14px;">
          <button id="btnEntrar" type="button" class="btn primary">Entrar</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="login.js"></script>
</body>
</html>
