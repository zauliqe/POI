<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <title>Perfil</title>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"></div><div><b>CamOllin</b><div style="font-size:12px;color:var(--muted);">Perfil</div></div></div>
    <nav class="nav">
      <a href="dashboard.html">Chats</a>
      <a href="notificaciones.html">Notificaciones</a>
      <a href="recompensas.html">Recompensas</a>
      <a class="active" href="perfil.html">Perfil</a>
    </nav>
    <div class="sideSection">
      <div class="pill">Info</div>
      <nav class="nav">
        <a href="mundial.html">Mundial 2026</a>
        <a href="acerca-de.html">Acerca de</a>
      </nav>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="left"><div id="perfilAvatar" class="avatar">U</div><div><div id="perfilTitle" class="title">Mi perfil</div><div id="perfilSubtitle" class="sub">@usuario</div></div></div>
      <div class="right"><button id="btnGuardarPerfil" class="btn small primary">Guardar</button></div>
    </header>

    <section class="stage">
      <div class="container">
        <div class="grid2">
          <div class="card pad">
            <h2 class="h2">Datos</h2>
            <div style="margin-top:12px;"><input id="nombrePerfil" class="input" placeholder="Nombre" /></div>
            <div style="margin-top:12px;"><input id="usuarioPerfil" class="input" placeholder="Usuario" /></div>
            <div style="margin-top:12px;"><input id="correoPerfil" class="input" placeholder="Correo" disabled /></div>
            <div style="margin-top:12px;"><input id="telefonoPerfil" class="input" placeholder="Teléfono" /></div>
          </div>

          <div class="card pad">
            <h2 class="h2">Cuenta</h2>
            <p class="p">Tu nombre y usuario aparecen en chats, grupos, tareas y notificaciones.</p>
            <div style="margin-top:12px;"><select class="select"><option>Tema: Oscuro verde</option></select></div>
            <div style="margin-top:12px;"><select class="select"><option>Privacidad: Mostrar estado activo</option></select></div>
            <div style="margin-top:12px;"><button id="btnCerrarSesion" class="btn danger">Cerrar sesión</button></div>
          </div>
        </div>
      </div>
    </section>

    <footer class="composer">
      <div class="pill">El estado activo se actualiza al entrar y salir.</div>
    </footer>
  </main>
</div>
<script type="module" src="perfil.js"></script>
</body>
</html>
