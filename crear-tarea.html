<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <title>Crear tarea</title>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"></div><div><b>CamOllin</b><div style="font-size:12px;color:var(--muted);">Crear tarea</div></div></div>
    <nav class="nav">
      <a href="tareas-grupo.html">Tareas del grupo</a>
      <a class="active" href="crear-tarea.html">Crear tarea</a>
      <a href="dashboard.html">Chats</a>
    </nav>
    <div class="sideSection">
      <div class="pill">Info</div>
      <nav class="nav">
        <a href="mundial.html">Mundial 2026</a>
        <a href="acerca-de.html">Acerca de</a>
      </nav>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="left"><div class="avatar">+</div><div><div class="title">Nueva tarea</div><div id="grupoNombre" class="sub">Grupo</div></div></div>
      <div class="right"><a class="btn small" href="tareas-grupo.html">Cancelar</a></div>
    </header>

    <section class="stage">
      <div class="container">
        <form id="tareaForm" class="card pad">
          <div class="grid2">
            <div><label class="p">Título</label><input id="tituloTarea" class="input" placeholder="Ej: Investigar tema" /></div>
            <div><label class="p">Fecha límite</label><input id="fechaTarea" class="input" type="date" /></div>
          </div>
          <div class="grid2" style="margin-top:12px;">
            <div><label class="p">Asignar a</label><select id="asignadoTarea" class="select"><option value="Equipo">Equipo</option></select></div>
            <div><label class="p">Prioridad</label>
              <select id="prioridadTarea" class="select"><option>Media</option><option>Alta</option><option>Baja</option></select>
            </div>
          </div>
          <div style="margin-top:12px;">
            <label class="p">Descripción</label>
            <textarea id="descripcionTarea" class="textarea" placeholder="Detalles de la tarea..."></textarea>
          </div>
          <div style="display:flex; gap:10px; margin-top:14px;">
            <button class="btn primary" type="submit">Crear</button>
            <a class="btn" href="tareas-grupo.html">Volver</a>
          </div>
        </form>
      </div>
    </section>

    <footer class="composer">
      <div class="pill">Al crearla también se genera una notificación.</div>
    </footer>
  </main>
</div>
<script type="module" src="crear-tarea.js"></script>
</body>
</html>
